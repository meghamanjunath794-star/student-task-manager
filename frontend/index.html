<!DOCTYPE html>
<html>
<head>

<title>Study Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<div class="sidebar">

<div class="profile">

<img src="https://i.pravatar.cc/100">

<h3>Megha</h3>

<p>CS Student</p>

</div>

<nav>

<button onclick="showSection('tasks')">Tasks</button>

<button onclick="showSection('planner')">Planner</button>

<button onclick="showSection('generator')">AI Plan</button>

<button onclick="showSection('weekly')">Weekly Plan</button>

<button onclick="showSection('analytics')">Analytics</button>

<button onclick="showSection('deadline')">Deadline</button>

</nav>

</div>

<div class="main">

<h1 class="title">Study Dashboard</h1>

<div id="tasks" class="card">

<h2>Task Manager</h2>

<input id="taskInput">

<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>

<div id="generator" class="card">

<h2>AI Study Plan</h2>

<input id="subject" placeholder="Subject">

<input id="days" type="number" placeholder="Days">

<button onclick="generatePlan()">Generate</button>

<div id="planResult"></div>

</div>

<div id="weekly" class="card">

<h2>Weekly Scheduler</h2>

<input id="weekSubject">

<button onclick="generateWeeklyPlan()">

Generate

</button>

<div id="weeklyResult"></div>

</div>

<div id="deadline" class="card">

<h2>Deadline Reminder</h2>

<input id="deadlineTask" placeholder="Task">

<input id="deadlineDate" type="date">

<button onclick="setDeadline()">Set Reminder</button>

<p id="deadlineMsg"></p>

</div>

<div id="analytics" class="card">

<h2>Study Analytics</h2>

<canvas id="studyChart"></canvas>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
