<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="layout">

<!-- Sidebar -->

<div class="sidebar">

<div class="avatar">M</div>

<h3>Megha</h3>

<p>CS Student</p>

<button onclick="show('tasks')">Tasks</button>

<button onclick="show('generator')">AI Plan</button>

<button onclick="show('weekly')">Weekly Planner</button>

<button onclick="show('deadline')">Deadline</button>

<button onclick="show('chat')">AI Assistant</button>

<button onclick="show('streak')">Study Streak</button>

</div>

<!-- Main -->

<div class="main">

<h1 class="page-title">Study Dashboard</h1>


<!-- TASK BOARD -->

<div id="tasks" class="section">

<h2 class="section-title">Task Board</h2>

<input id="taskInput" placeholder="Enter task">

<button onclick="addTask()" class="primary-btn">

Add Task

</button>

<ul id="taskList"></ul>

</div>


<!-- AI PLAN -->

<div id="generator" class="section">

<h2 class="section-title">

AI Study Plan Generator

</h2>

<input id="subject" placeholder="Subject">

<input id="days" type="number" placeholder="Days">

<button onclick="generatePlan()" class="primary-btn">

Generate Plan

</button>

<div id="planResult"></div>

</div>


<!-- WEEKLY -->

<div id="weekly" class="section">

<h2 class="section-title">

Weekly Study Planner

</h2>

<input id="weeklySubject" placeholder="Subject">

<button onclick="generateWeek()" class="primary-btn">

Generate Weekly Plan

</button>

<div id="weekResult"></div>

</div>


<!-- DEADLINE -->

<div id="deadline" class="section">

<h2 class="section-title">

Deadline Reminder

</h2>

<input id="deadlineTask">

<input id="deadlineDate" type="date">

<button onclick="setDeadline()" class="primary-btn">

Set Reminder

</button>

<p id="deadlineMsg"></p>

</div>


<!-- AI ASSISTANT -->

<div id="chat" class="section">

<h2 class="section-title">

AI Study Assistant

</h2>

<input id="chatInput" placeholder="Ask anything">

<button onclick="askAI()" class="primary-btn">

Ask AI

</button>

<div id="chatResult"></div>

</div>


<!-- STREAK -->

<div id="streak" class="section">

<h2 class="section-title">

Study Streak

</h2>

<p id="streakCount">0</p>

<button onclick="updateStreak()" class="primary-btn">

Mark Study Done

</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
