<!DOCTYPE html>
<html>
<head>

<title>Study Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="layout">

<!-- Sidebar -->

<div class="sidebar">

<div class="avatar">M</div>

<h3>Megha</h3>
<p>CS Student</p>

<button onclick="show('tasks')">Tasks</button>
<button onclick="show('generator')">AI Plan</button>
<button onclick="show('weekly')">Weekly Planner</button>
<button onclick="show('calendar')">Calendar</button>
<button onclick="show('analytics')">Analytics</button>
<button onclick="show('deadline')">Deadline</button>
<button onclick="show('chat')">AI Chat</button>
<button onclick="show('streak')">Study Streak</button>

</div>


<!-- Main -->

<div class="main">

<h1 class="page-title">Study Dashboard</h1>


<!-- TASK BOARD -->

<div id="tasks" class="section">

<h2 class="section-title">Task Board</h2>

<input id="taskInput" placeholder="Enter your task">

<button class="primary-btn" onclick="addTask()">Add Task</button>

<ul id="taskList" class="task-list"></ul>

</div>


<!-- AI PLAN -->

<div id="generator" class="section">

<h2 class="section-title">AI Study Plan Generator</h2>

<input id="subject" placeholder="Subject">

<input id="days" type="number" placeholder="Days">

<button class="primary-btn" onclick="generatePlan()">Generate Plan</button>

<div id="planResult"></div>

</div>


<!-- WEEKLY -->

<div id="weekly" class="section">

<h2 class="section-title">Weekly Planner</h2>

<input id="weeklySubject" placeholder="Subject">

<button class="primary-btn" onclick="generateWeek()">Generate Weekly Plan</button>

<div id="weekResult"></div>

</div>


<!-- CALENDAR -->

<div id="calendar" class="section">

<h2 class="section-title">Study Calendar</h2>

<div id="calendarGrid"></div>

</div>


<!-- ANALYTICS -->

<div id="analytics" class="section">

<h2 class="section-title">Study Analytics</h2>

<canvas id="studyChart"></canvas>

</div>


<!-- DEADLINE -->

<div id="deadline" class="section">

<h2 class="section-title">Deadline Reminder</h2>

<input id="deadlineTask">

<input id="deadlineDate" type="date">

<button class="primary-btn" onclick="setDeadline()">Set Reminder</button>

<p id="deadlineMsg"></p>

</div>


<!-- AI CHAT -->

<div id="chat" class="section">

<h2 class="section-title">AI Study Assistant</h2>

<input id="chatInput" placeholder="Ask a study question">

<button class="primary-btn" onclick="askAI()">Ask</button>

<div id="chatResult"></div>

</div>


<!-- STREAK -->

<div id="streak" class="section">

<h2 class="section-title">Study Streak</h2>

<p id="streakCount">0</p>

<button class="primary-btn" onclick="updateStreak()">Mark Study Done</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
