<!DOCTYPE html>
<html>

<head>

<title>Study Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="layout">

<div class="sidebar">

<div class="profile-avatar">M</div>

<h3>Megha</h3>
<p>CS Student</p>

<button onclick="show('tasks')">Tasks</button>
<button onclick="show('planner')">Planner</button>
<button onclick="show('generator')">AI Plan</button>
<button onclick="show('weekly')">Weekly</button>
<button onclick="show('deadline')">Deadline</button>
<button onclick="show('analytics')">Analytics</button>
<button onclick="show('pomodoro')">Pomodoro</button>
<button onclick="show('chat')">AI Chat</button>
<button onclick="toggleTheme()">Theme</button>

</div>

<div class="main">

<h1>Study Dashboard</h1>

<!-- TASK BOARD -->

<div id="tasks" class="section">

<h2>Task Board</h2>

<input id="taskInput">
<button onclick="addTask()">Add Task</button>

<ul id="taskList"></ul>

</div>

<!-- AI PLAN -->

<div id="generator" class="section">

<h2>AI Study Plan</h2>

<input id="subject" placeholder="Subject">

<input id="days" type="number" placeholder="Days">

<button onclick="generatePlan()">Generate Plan</button>

<div id="planResult"></div>

</div>

<!-- WEEKLY -->

<div id="weekly" class="section">

<h2>Weekly Planner</h2>

<button onclick="generateWeek()">Generate</button>

<div id="weekResult"></div>

</div>

<!-- DEADLINE -->

<div id="deadline" class="section">

<h2>Deadline Reminder</h2>

<input id="deadlineTask">

<input type="date" id="deadlineDate">

<button onclick="setDeadline()">Set</button>

<p id="deadlineMsg"></p>

</div>

<!-- ANALYTICS -->

<div id="analytics" class="section">

<h2>Study Analytics</h2>

<canvas id="studyChart"></canvas>

</div>

<!-- POMODORO -->

<div id="pomodoro" class="section">

<h2>Pomodoro Timer</h2>

<p id="timer">25:00</p>

<button onclick="startPomodoro()">Start</button>

</div>

<!-- AI CHAT -->

<div id="chat" class="section">

<h2>AI Study Assistant</h2>

<input id="chatInput">

<button onclick="askAI()">Ask</button>

<div id="chatResult"></div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
