<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Task Manager</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>


<body>

<div class="layout">


<!-- SIDEBAR -->

<div class="sidebar">

<div class="avatar">M</div>

<h3>Megha</h3>

<p>CS Student</p>

<button onclick="toggleTheme()">Toggle Theme</button>

<button onclick="showSection('tasks')">Tasks</button>

<button onclick="showSection('studyplan')">AI Plan</button>

<button onclick="showSection('weekly')">Weekly Plan</button>

<button onclick="showSection('deadline')">Deadline</button>

<button onclick="showSection('assistant')">AI Assistant</button>

<button onclick="showSection('doubt')">Doubt Solver</button>

<button onclick="showSection('roadmap')">Roadmap</button>

<button onclick="showSection('progress')">Progress</button>

</div>



<!-- MAIN CONTENT -->

<div class="main">


<h1 class="page-title">Study Dashboard</h1>



<!-- TASK BOARD -->

<div id="tasks" class="card">

<h2>Task Board</h2>

<input id="taskInput" placeholder="Enter task">

<button onclick="addTask()">Add Task</button>

<ul id="taskList"></ul>

</div>



<!-- AI STUDY PLAN -->

<div id="studyplan" class="card">

<h2>AI Study Plan</h2>

<input id="subject" placeholder="Subject">

<input id="days" placeholder="Days">

<button onclick="generatePlan()">Generate</button>

<div id="planResult"></div>

</div>



<!-- WEEKLY PLANNER -->

<div id="weekly" class="card">

<h2>Weekly Study Planner</h2>

<input id="weeklySubject" placeholder="Subject">

<button onclick="generateWeek()">Generate</button>

<div id="weekResult"></div>

</div>



<!-- DEADLINE -->

<div id="deadline" class="card">

<h2>Deadline Reminder</h2>

<input id="deadlineTask" placeholder="Task">

<input id="deadlineDate" type="date">

<button onclick="setDeadline()">Set Reminder</button>

<p id="deadlineMsg"></p>

</div>



<!-- AI STUDY ASSISTANT -->

<div id="assistant" class="card">

<h2>AI Study Assistant</h2>

<input id="chatInput" placeholder="Ask study question">

<button onclick="askAI()">Ask</button>

<div id="chatResult"></div>

</div>



<!-- AI DOUBT SOLVER -->

<div id="doubt" class="card">

<h2>AI Doubt Solver</h2>

<div id="chatBox"></div>

<input id="doubtInput" placeholder="Ask your doubt">

<button onclick="solveDoubt()">Send</button>

</div>



<!-- ROADMAP GENERATOR -->

<div id="roadmap" class="card">

<h2>AI Roadmap Generator</h2>

<input id="roadmapSubject" placeholder="Subject">

<input id="goal" placeholder="Goal">

<input id="roadmapDays" placeholder="Days">

<button onclick="generateRoadmap()">Generate</button>

<div id="roadmapResult"></div>

</div>



<!-- STUDY PROGRESS -->

<div id="progress" class="card">

<h2>Study Progress</h2>

<canvas id="progressChart"></canvas>

<button onclick="updateProgress()">Add Study Session</button>

</div>



</div>
</div>


<script src="script.js"></script>

</body>
</html>
