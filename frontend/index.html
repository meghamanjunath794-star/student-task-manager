<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="layout">

<div class="sidebar">

<div class="avatar">M</div>

<h3>Megha</h3>

<p>CS Student</p>

<button onclick="show('tasks')">Tasks</button>
<button onclick="show('plan')">AI Plan</button>
<button onclick="show('weekly')">Weekly</button>
<button onclick="show('deadline')">Deadline</button>
<button onclick="show('assistant')">AI Assistant</button>
<button onclick="show('streak')">Study Streak</button>

</div>


<div class="main">

<h1 class="page-title">Study Dashboard</h1>


<div id="tasks" class="card">

<h2>Task Board</h2>

<input id="taskInput" placeholder="Add task">

<button onclick="addTask()">Add Task</button>

<ul id="taskList"></ul>

</div>


<div id="plan" class="card">

<h2>AI Study Plan</h2>

<input id="subject" placeholder="Subject">

<input id="days" placeholder="Days">

<button onclick="generatePlan()">Generate</button>

<div id="planResult"></div>

</div>


<div id="weekly" class="card">

<h2>Weekly Planner</h2>

<input id="weeklySubject">

<button onclick="generateWeek()">Generate</button>

<div id="weekResult"></div>

</div>


<div id="deadline" class="card">

<h2>Deadline Reminder</h2>

<input id="deadlineTask">

<input id="deadlineDate" type="date">

<button onclick="setDeadline()">Set Reminder</button>

<p id="deadlineMsg"></p>

</div>


<div id="assistant" class="card">

<h2>AI Study Assistant</h2>

<input id="chatInput" placeholder="Ask study question">

<button onclick="askAI()">Ask</button>

<div id="chatResult"></div>

</div>


<div id="streak" class="card">

<h2>Study Streak</h2>

<p id="streakCount">0</p>

<button onclick="updateStreak()">Mark Study Done</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
