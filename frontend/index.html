<!DOCTYPE html>
<html>
<head>

<title>Study Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="profile">

<img src="https://i.pravatar.cc/100">

<h3>Megha</h3>

<p>Computer Science Student</p>

</div>

<nav>

<button onclick="showSection('tasks')">Tasks</button>

<button onclick="showSection('planner')">Planner</button>

<button onclick="showSection('calendar')">Calendar</button>

<button onclick="showSection('pomodoro')">Pomodoro</button>

<button onclick="showSection('generator')">Plan Generator</button>

<button onclick="showSection('progress')">Progress</button>

</nav>

<button class="logout" onclick="logout()">Logout</button>

</div>

<!-- MAIN DASHBOARD -->

<div class="main">

<h1 class="title">Study Dashboard</h1>

<!-- TASKS -->

<div id="tasks" class="card">

<h2>Tasks</h2>

<input id="taskInput" placeholder="New task">

<select id="category">

<option>Study</option>
<option>Work</option>
<option>Personal</option>

</select>

<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>

<!-- STUDY PLANNER -->

<div id="planner" class="card">

<h2>Study Planner</h2>

<textarea placeholder="Write your study plan"></textarea>

</div>

<!-- CALENDAR -->

<div id="calendar" class="card">

<h2>Calendar</h2>

<input type="date">

</div>

<!-- POMODORO -->

<div id="pomodoro" class="card">

<h2>Pomodoro Timer</h2>

<p id="timer">25:00</p>

<button onclick="startTimer()">Start</button>

</div>

<!-- PLAN GENERATOR -->

<div id="generator" class="card">

<h2>AI Study Plan</h2>

<input id="goal" placeholder="Example: Learn React">

<button onclick="generatePlan()">Generate</button>

<p id="planResult"></p>

</div>

<!-- PROGRESS -->

<div id="progress" class="card">

<h2>Progress Tracker</h2>

<progress id="progressBar" value="0" max="100"></progress>

<button onclick="increaseProgress()">Update Progress</button>

</div>

</div>

</div>

<button class="floating-btn">+</button>

<script src="script.js"></script>

</body>
</html>
