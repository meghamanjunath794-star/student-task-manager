<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

</head>

<body>

<div class="dashboard">

<div class="sidebar">

<h2 class="logo">StudyApp</h2>

<button class="menu">Dashboard</button>
<button class="menu">Tasks</button>
<button class="menu">Calendar</button>
<button class="menu">Planner</button>

</div>

<div class="main">

<h1 class="headline">Hi Megha 👋</h1>

<div class="cards">

<div class="card pink">
<h3>Data Mining</h3>
<p>4 Tasks</p>
</div>

<div class="card purple">
<h3>Web Design</h3>
<p>2 Tasks</p>
</div>

<div class="card blue">
<h3>Machine Learning</h3>
<p>3 Tasks</p>
</div>

</div>

<h2 class="section">My Tasks</h2>

<div id="taskList"></div>

<button class="add-btn" onclick="addTask()">+</button>

<h2 class="section">Study Calendar</h2>

<div id="calendar"></div>

<h2 class="section">AI Study Planner</h2>

<div class="ai-box">

<input id="studyGoal" placeholder="Example: Learn React in 7 days">

<button onclick="generatePlan()">
Generate Plan
</button>

<div id="aiResult"></div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script src="script.js"></script>

</body>

</html>
