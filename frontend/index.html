<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-container">
    <h2>Welcome Back 👋</h2>
    <input type="email" id="emailInput" placeholder="Email">
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="login()" class="primary-btn">Login</button>
</div>

<!-- APP PAGE -->
<div id="appPage" class="mobile-container" style="display:none;">

    <h2>Hi, Megha 👋</h2>

    <input type="text" id="taskInput" placeholder="Add new task...">

    <!-- Category Tabs -->
    <div class="categories">
        <button onclick="filterTasks('All')" class="cat all">All</button>
        <button onclick="filterTasks('Study')" class="cat study">Study</button>
        <button onclick="filterTasks('Work')" class="cat work">Work</button>
        <button onclick="filterTasks('Personal')" class="cat personal">Personal</button>
    </div>

    <div id="taskList"></div>

    <button class="floating-btn" onclick="addTask()">+</button>
    <button class="logout-btn" onclick="logout()">Logout</button>

</div>

<script src="script.js"></script>
</body>
</html>
